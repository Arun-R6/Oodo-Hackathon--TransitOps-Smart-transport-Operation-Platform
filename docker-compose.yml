version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: transitops-db
    environment:
      POSTGRES_DB: transitops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - transitops_data:/var/lib/postgresql/data

volumes:
  transitops_data:
